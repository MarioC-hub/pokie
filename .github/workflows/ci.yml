name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  rust-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Run Rust workspace checks
        run: ./scripts/run_rust_checks.sh

  desktop-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Run frontend checks
        run: ./scripts/run_frontend_checks.sh

  desktop-shell-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Run desktop shell checks
        shell: bash
        run: ./scripts/run_desktop_shell_checks.sh native
